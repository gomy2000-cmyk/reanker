<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" role="img" aria-label="ReAnker ダッシュボードのイメージ">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eff6ff"/>
    </linearGradient>
    <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.07"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="800" height="480" fill="url(#bgGrad)"/>

  <!-- browser frame -->
  <rect x="40" y="32" width="720" height="416" rx="10" fill="#fff" filter="url(#cardShadow)"/>
  <rect x="40" y="32" width="720" height="36" rx="10" fill="#f1f5f9"/>
  <rect x="40" y="60" width="720" height="2" fill="#e2e8f0"/>
  <circle cx="60" cy="50" r="5" fill="#ef4444"/>
  <circle cx="78" cy="50" r="5" fill="#f59e0b"/>
  <circle cx="96" cy="50" r="5" fill="#10b981"/>
  <rect x="120" y="42" width="360" height="16" rx="3" fill="#e2e8f0"/>
  <text x="130" y="54" fill="#64748b" font-family="ui-sans-serif, system-ui, -apple-system" font-size="11">reanker.com/dashboard</text>

  <!-- sidebar -->
  <rect x="40" y="62" width="160" height="386" fill="#f8fafc"/>
  <rect x="40" y="62" width="160" height="2" fill="#e2e8f0"/>
  <rect x="200" y="62" width="2" height="386" fill="#e2e8f0"/>

  <!-- sidebar logo -->
  <rect x="58" y="86" width="60" height="20" rx="2" fill="#0f172a"/>
  <text x="62" y="100" fill="#fff" font-family="ui-sans-serif, system-ui" font-weight="700" font-size="12">ReAnker</text>

  <!-- sidebar items -->
  <rect x="56" y="136" width="128" height="28" rx="6" fill="#378ADD" opacity="0.12"/>
  <circle cx="68" cy="150" r="3" fill="#378ADD"/>
  <text x="80" y="154" fill="#378ADD" font-family="ui-sans-serif" font-size="11" font-weight="600">ダッシュボード</text>

  <text x="68" y="186" fill="#475569" font-family="ui-sans-serif" font-size="11">📡 アンカー一覧</text>
  <text x="68" y="214" fill="#475569" font-family="ui-sans-serif" font-size="11">📊 レポート</text>
  <text x="68" y="242" fill="#475569" font-family="ui-sans-serif" font-size="11">⚙️ 設定</text>

  <text x="58" y="290" fill="#94a3b8" font-family="ui-sans-serif" font-size="10" font-weight="600" letter-spacing="0.05em">監視中のアンカー</text>
  <text x="68" y="312" fill="#475569" font-family="ui-sans-serif" font-size="11">• 競合A社</text>
  <text x="68" y="332" fill="#475569" font-family="ui-sans-serif" font-size="11">• 競合B社</text>
  <text x="68" y="352" fill="#475569" font-family="ui-sans-serif" font-size="11">• 競合C社</text>
  <text x="68" y="372" fill="#475569" font-family="ui-sans-serif" font-size="11">• 業界KW: SaaS</text>

  <!-- main heading -->
  <text x="226" y="100" fill="#0f172a" font-family="ui-sans-serif" font-size="16" font-weight="700">今日の新着リリース</text>
  <text x="226" y="118" fill="#64748b" font-family="ui-sans-serif" font-size="11">2026年5月24日 · 12件</text>

  <!-- KPI cards -->
  <g transform="translate(226, 132)">
    <rect width="155" height="62" rx="8" fill="#fff" stroke="#e2e8f0"/>
    <text x="14" y="20" fill="#64748b" font-family="ui-sans-serif" font-size="10">本日の新着</text>
    <text x="14" y="46" fill="#0f172a" font-family="ui-sans-serif" font-size="22" font-weight="700">12</text>
    <text x="50" y="46" fill="#10b981" font-family="ui-sans-serif" font-size="10" font-weight="600">↑ +3</text>
  </g>
  <g transform="translate(391, 132)">
    <rect width="155" height="62" rx="8" fill="#fff" stroke="#e2e8f0"/>
    <text x="14" y="20" fill="#64748b" font-family="ui-sans-serif" font-size="10">今月の累計</text>
    <text x="14" y="46" fill="#0f172a" font-family="ui-sans-serif" font-size="22" font-weight="700">187</text>
  </g>
  <g transform="translate(556, 132)">
    <rect width="155" height="62" rx="8" fill="#fff" stroke="#e2e8f0"/>
    <text x="14" y="20" fill="#64748b" font-family="ui-sans-serif" font-size="10">クリップ</text>
    <text x="14" y="46" fill="#0f172a" font-family="ui-sans-serif" font-size="22" font-weight="700">24</text>
  </g>

  <!-- release list items -->
  <g transform="translate(226, 210)">
    <rect width="485" height="56" rx="8" fill="#fff" stroke="#e2e8f0"/>
    <rect x="14" y="14" width="56" height="20" rx="3" fill="#378ADD" opacity="0.12"/>
    <text x="22" y="28" fill="#378ADD" font-family="ui-sans-serif" font-size="10" font-weight="600">PR TIMES</text>
    <text x="80" y="28" fill="#0f172a" font-family="ui-sans-serif" font-size="12" font-weight="600">競合A社、新機能「自動レポート」をリリース</text>
    <text x="80" y="44" fill="#64748b" font-family="ui-sans-serif" font-size="10">5月24日 09:30 · 競合A社</text>
  </g>
  <g transform="translate(226, 274)">
    <rect width="485" height="56" rx="8" fill="#fff" stroke="#e2e8f0"/>
    <rect x="14" y="14" width="70" height="20" rx="3" fill="#0f172a" opacity="0.08"/>
    <text x="22" y="28" fill="#475569" font-family="ui-sans-serif" font-size="10" font-weight="600">Google News</text>
    <text x="94" y="28" fill="#0f172a" font-family="ui-sans-serif" font-size="12" font-weight="600">競合B社がシリーズC調達 30億円を発表</text>
    <text x="94" y="44" fill="#64748b" font-family="ui-sans-serif" font-size="10">5月24日 11:15 · 競合B社</text>
  </g>
  <g transform="translate(226, 338)">
    <rect width="485" height="56" rx="8" fill="#fff" stroke="#e2e8f0"/>
    <rect x="14" y="14" width="56" height="20" rx="3" fill="#378ADD" opacity="0.12"/>
    <text x="22" y="28" fill="#378ADD" font-family="ui-sans-serif" font-size="10" font-weight="600">PR TIMES</text>
    <text x="80" y="28" fill="#0f172a" font-family="ui-sans-serif" font-size="12" font-weight="600">業界キーワード「SaaS DX」で5件の新着</text>
    <text x="80" y="44" fill="#64748b" font-family="ui-sans-serif" font-size="10">5月24日 14:00 · 5件まとめ</text>
  </g>
  <g transform="translate(226, 402)">
    <rect width="485" height="34" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="240" y="22" fill="#64748b" font-family="ui-sans-serif" font-size="11" text-anchor="middle">もっと見る ↓</text>
  </g>
</svg>
